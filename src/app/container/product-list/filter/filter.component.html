<div class="filter-container">
    <span>Filter: </span>

    <input type="radio" name="filter" value="all" [(ngModel)]="selectedFilterButton" (change)="onSelectedFilterRadioButtonChaanged()"/>
    <span>ALL({{all}})</span>

    <input type="radio" name="filter" value="true" [(ngModel)]="selectedFilterButton" (change)="onSelectedFilterRadioButtonChaanged()"/>
    <span>IN STOCK({{inStock}})</span>

    <input type="radio" name="filter" value="false" [(ngModel)]="selectedFilterButton" (change)="onSelectedFilterRadioButtonChaanged()"/>
    <span>OUT OF STOCK({{outOfStock}})</span>
</div>
