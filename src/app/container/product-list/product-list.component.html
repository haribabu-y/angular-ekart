<app-filter
 [all]="totalProductCount"
 [inStock]="totalInStockCount"
 [outOfStock]="totalOutOfStockCount"
 (selectedFilterRadioButtonChanged)="filterChanged($event)"
></app-filter>
<div class="ekart--products--container">
    <!-- *ngIf="selectedFilter === 'all' || product.is_in_inventory.toString() == selectedFilter" -->
    <ng-container *ngFor="let product of products">
    <app-product [product]="product" *ngIf="searchText === '' || product.name.toLowerCase().includes(searchText.toLowerCase())" (click)="selectedProduct = product"></app-product>
    </ng-container>
</div>
